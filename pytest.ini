[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    unit: unit tests (no external deps)
    integration: integration tests (may need filesystem)
    e2e: end-to-end tests (may spin up processes)
    security: security-focused tests
    performance: performance and token-budget tests
    slow: tests that take longer than 5 seconds
