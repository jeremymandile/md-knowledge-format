name: Test Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-test.txt

    - name: Validate spec files
      run: |
        python -c "import yaml,sys,pathlib; errors=[]; [errors.append(str(p)+': '+str(e)) for p in pathlib.Path('spec').glob('*.yaml') for e in [None] if (lambda: yaml.safe_load(p.read_text()))()]; print('All spec YAML files valid')"

    - name: Run tests
      run: |
        pytest tests/ -v --tb=short

    - name: Upload coverage report
      if: matrix.python-version == '3.11'
      uses: actions/upload-artifact@v3
      with:
        name: coverage-report
        path: htmlcov/
        if-no-files-found: ignore
